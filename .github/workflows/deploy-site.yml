role.addToPolicy(new iam.PolicyStatement({
  effect: iam.Effect.ALLOW,
  actions: [
    'ssm:*',
    'ec2:*',
    'rds:*',
    's3:*',
    'lambda:*',
    'states:*',
    'events:*',
    'cloudwatch:*',
    'sns:*',
    'logs:*',
    'backup:*',
    // 'iam:PassRole' removed for least privilege
  ],
  resources: ['*']
}));

